# lefthook.yml — local git hooks for race_coach
#
# Install: brew install lefthook && lefthook install
# Skip once: git commit --no-verify (but don't make a habit of it)

# =============================================================================
# pre-commit — fast checks only (<10s total). Runs on every commit.
# =============================================================================
pre-commit:
  parallel: true
  commands:
    dart-format:
      glob: "*.dart"
      run: dart format --set-exit-if-changed {staged_files}
      stage_fixed: true    # auto-stage reformatted files

    rust-format:
      glob: "*.rs"
      run: cd rust && cargo fmt --check

    proto-lint:
      glob: "*.proto"
      run: buf lint

    flutter-analyze:
      glob: "*.dart"
      run: flutter analyze --no-fatal-infos

# =============================================================================
# pre-push — thorough checks (<30s total). Runs before push.
#
# Codegen freshness runs first (regenerates + diffs), then tests run
# in parallel afterward.
# =============================================================================
pre-push:
  piped: true
  commands:
    # Group 1: All codegen freshness (proto + FRB).
    # Must complete before rust compiles (proto deletes/regenerates .rs files).
    codegen-fresh:
      priority: 1
      run: make gen-check

    # Group 2: Everything else runs after codegen is validated.
    flutter-test:
      glob: "*.dart"
      priority: 2
      run: flutter test

    rust-clippy:
      glob: "*.rs"
      priority: 2
      run: cd rust && cargo clippy --all-targets -- -D warnings

    rust-test:
      glob: "*.rs"
      priority: 2
      run: cd rust && cargo test

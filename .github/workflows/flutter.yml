name: Flutter

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.*'
      - 'analysis_options.yaml'
  pull_request:
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.*'
      - 'analysis_options.yaml'

jobs:
  flutter:
    name: Analyze + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # firebase_options.dart is gitignored (generated by flutterfire configure).
      # Use the CI stub so flutter analyze can resolve the import.
      - name: Provide Firebase options stub
        run: |
          if [ ! -f lib/firebase_options.dart ]; then
            cp lib/firebase_options.ci.dart lib/firebase_options.dart
          fi

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

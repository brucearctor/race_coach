syntax = "proto3";

package racecoach.v1;

import "google/protobuf/timestamp.proto";
import "racecoach/v1/telemetry.proto";

option java_package = "com.race2.racecoach.v1";
option go_package = "github.com/brucearctor/racecoach/gen/go/racecoach/v1";

// ---------------------------------------------------------------------------
// Session, Lap, and Track definitions
// ---------------------------------------------------------------------------

// A complete driving session (one outing at a track).
message Session {
  string session_id = 1;
  string track_name = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  repeated Lap laps = 5;
  SessionConfig config = 6;
  repeated SourceType active_sources = 7;
}

// A single lap within a session.
message Lap {
  uint32 lap_number = 1;
  float lap_time_seconds = 2;
  repeated TelemetryFrame telemetry = 3;
  bool is_reference = 4;
  repeated float sector_times_seconds = 5;
  google.protobuf.Timestamp start_time = 6;
}

// Configuration for a session (set before or during recording).
message SessionConfig {
  // Finish line definition (two GPS points forming a line segment).
  GpsData finish_line_point_a = 1;
  GpsData finish_line_point_b = 2;

  // Sector split points (optional).
  repeated SectorLine sector_lines = 3;

  // Preferences.
  SpeedUnit speed_unit = 4;
  TemperatureUnit temp_unit = 5;
  bool audio_coaching_enabled = 6;
}

// A sector split line (two GPS points forming a line segment).
message SectorLine {
  uint32 sector_number = 1;
  GpsData point_a = 2;
  GpsData point_b = 3;
}

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

enum SpeedUnit {
  SPEED_UNIT_UNSPECIFIED = 0;
  SPEED_UNIT_MPH = 1;
  SPEED_UNIT_KMH = 2;
}

enum TemperatureUnit {
  TEMPERATURE_UNIT_UNSPECIFIED = 0;
  TEMPERATURE_UNIT_CELSIUS = 1;
  TEMPERATURE_UNIT_FAHRENHEIT = 2;
}

// ---------------------------------------------------------------------------
// Session metadata — stored as a separate meta.pb file alongside session.pb.
// Small (~200 bytes), editable post-session without rewriting telemetry.
// ---------------------------------------------------------------------------

// Who was driving, what car, what conditions — snapshotted at session start.
message SessionMeta {
  string session_id = 1;
  string driver_name = 2;
  Vehicle vehicle = 3;
  Conditions conditions = 4;
  SessionType session_type = 5;
  DeviceInfo device_info = 6;
  string notes = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// Vehicle metadata, snapshotted at session start.
message Vehicle {
  string name = 1;            // User-facing label, e.g. "My Miata"
  string make = 2;            // "Mazda"
  string model = 3;           // "MX-5 ND"
  uint32 year = 4;            // 2024
  string vehicle_class = 5;   // "Spec Miata" / "NASA ST5" / "Street"
  float weight_kg = 6;        // Curb weight
  float power_hp = 7;         // Peak HP
  string tire_compound = 8;   // "RE-71RS 200tw"
  TirePressures tire_pressures = 9;
  string notes = 10;          // Setup notes
}

// Cold tire pressures at session start.
message TirePressures {
  float front_left_psi = 1;
  float front_right_psi = 2;
  float rear_left_psi = 3;
  float rear_right_psi = 4;
}

// Track/weather conditions at session time.
message Conditions {
  SurfaceCondition surface = 1;
  float ambient_temp_c = 2;
  float track_temp_c = 3;
  float humidity_pct = 4;     // 0-100
}

// Data source device info.
message DeviceInfo {
  string device_model = 1;      // "RaceBox Mini S"
  string firmware_version = 2;
  uint32 sample_rate_hz = 3;    // 10, 25
}

enum SurfaceCondition {
  SURFACE_CONDITION_UNSPECIFIED = 0;
  SURFACE_CONDITION_DRY = 1;
  SURFACE_CONDITION_DAMP = 2;
  SURFACE_CONDITION_WET = 3;
}

enum SessionType {
  SESSION_TYPE_UNSPECIFIED = 0;
  SESSION_TYPE_PRACTICE = 1;
  SESSION_TYPE_QUALIFYING = 2;
  SESSION_TYPE_RACE = 3;
  SESSION_TYPE_TEST = 4;
}
